name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        working-directory: orbitech
        run: |
          npm ci
          npm run build -- --base=/AIVC-Project-Bootcamp-/

      - name: Publish built site to repo root
        run: |
          rm -rf assets index.html
          cp -r orbitech/dist/* .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets
          git commit -m "deploy: update GitHub Pages site [skip ci]" || echo "no changes"
          git push
